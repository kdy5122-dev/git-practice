<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>CM-World | 통합 관리 시스템</title>
    <!-- Cesium 리소스 -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #map { width: 100vw; height: 100vh; }
        #sidebar {
            position: absolute; top: 0; left: 0; width: 280px; height: 100%;
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 30px 20px; z-index: 1000; font-family: '맑은 고딕', sans-serif;
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        #sidebar h2 { font-size: 20px; color: #00e676; margin: 0 0 25px 0; padding-bottom: 10px; border-bottom: 2px solid rgba(0, 230, 118, 0.3); }
        .menu-group { display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 16px; cursor: pointer; transition: 0.25s; }
        .menu-item:hover { background: rgba(0, 230, 118, 0.15); border-color: #00e676; transform: translateX(8px); }
        .menu-item .title { font-weight: 700; font-size: 15px; color: #fff; }
        .menu-item .desc { font-size: 12px; color: #999; }
        #layer-control { margin-top: auto; padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        label { cursor: pointer; display: flex; align-items: center; font-size: 14px; color: #ddd; }
        input[type="checkbox"] { margin-right: 12px; width: 18px; height: 18px; accent-color: #00e676; }
        #loading-status { font-size: 12px; color: #00e676; margin-top: 5px; font-weight: bold; }

        /* 로그아웃 버튼 추가 */
        .logout-btn { margin-top: 10px; padding: 8px; background: #ff4d4d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>🌊 시설물 관리</h2>
    <div class="menu-group">
        <div class="menu-item" onclick="zoomToLayer(0)">
            <span class="title">합강 캠핑장 이동</span>
            <span class="desc">표준 해수면(MSL) 기준</span>
        </div>
        <div class="menu-item" onclick="zoomToLayer(1)">
            <span class="title">감포댐 시설 이동</span>
            <span class="desc">타원체(ELI) 기준 정밀 모델</span>
        </div>
    </div>

    <div id="layer-control">
        <label>
            <input type="checkbox" id="layerToggle" checked disabled>
            <span id="layerLabel">데이터 로드 대기 중...</span>
        </label>
        <div id="loading-status"></div>

        <!-- 로그아웃 폼 -->
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">로그아웃</button>
        </form>
    </div>
</div>

<div id="map"></div>

<script>
    const config = {
        token: /*[[${accessToken}]]*/ "default_token",
        terrainUrl: "/cmworld/map/demN"
    };

    // DOM이 완전히 로드된 후 지도 초기화 실행
    document.addEventListener('DOMContentLoaded', () => {
        initSystem(config);
    });
</script>
</body>
</html>
